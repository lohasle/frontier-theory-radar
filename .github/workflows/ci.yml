name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Smoke run core scripts
        run: |
          python3 scripts/score_papers.py 2026-04-28 || true
          python3 scripts/generate_daily.py 2026-04-28
          python3 scripts/update_index.py 2026-04-28
          python3 scripts/build_pages.py 2026-04-28
