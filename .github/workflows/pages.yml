name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'daily/**'
      - 'papers/**'
      - 'trends/**'
      - 'insights/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll (static)
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs
          destination: ./_site
        continue-on-error: true

      - name: Direct Copy (fallback)
        if: always()
        run: |
          if [ ! -d "./_site" ] || [ -z "$(ls -A ./_site)" ]; then
            echo "Jekyll build failed or empty, using direct copy"
            mkdir -p ./_site
            cp -r docs/* ./_site/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
